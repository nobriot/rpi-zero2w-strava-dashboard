# Strava Dashboard — Example Configuration
#
# Copy this file to ~/.config/rpi-zero2w-strava-dashboard/config.toml
# and fill in your Strava API credentials.
#
# Create a Strava API app at https://www.strava.com/settings/api
# See the docs for detailed setup instructions.
# 

# ── Strava API credentials (required) ────────────────────────────────────────
[strava]
client_id = "YOUR_CLIENT_ID"
client_secret = "YOUR_CLIENT_SECRET"
refresh_token = "YOUR_REFRESH_TOKEN"

# ── Display settings (all optional) ──────────────────────────────────────────
[display]
# Show the TOTALS summary row (activity count, distance, time, elevation, kudos).
# Set to false to hide it and give more space to other sections. Default: true.
show_totals = false

# Show the LONGEST / FASTEST section (longest activities per sport + best race paces).
# Set to false to hide it and give more space to other sections. Default: true.
show_longest_fastest = true

# Polyline thickness in pixels for the last activity route. Default: 3.
polyline_thickness = 4

# Yearly distance goals (km). Used for progress bars on the dashboard.
# Define 1-3 goals. Order matters: first sport is a full-width bar on the top
# row. With 3 sports, the 2nd and 3rd share the second row as half-width bars.
# Available sports: "run", "ride", "swim".
# Optional: longest_by = "distance" (default) or "time" -- controls whether
# the "longest" activity highlight is ranked by distance or moving time.
# Default: run 500km, ride 5000km, swim 30km.

[[display.goals]]
sport = "ride"
km = 5000.0
longest_by = "time"

[[display.goals]]
sport = "run"
km = 500.0
longest_by = "distance"

[[display.goals]]
sport = "swim"
km = 30.0
longest_by = "distance"

# ── Power management (all optional) ──────────────────────────────────────────
[power]
# How often to refresh the dashboard (seconds). Default: 10800 (3 hours)
sleep_interval_secs = 10800

# Quiet hours -- no refresh between these hours (0-23, local time)
# when running on battery. Default: {start = 20, end = 6}
quiet_hours = { start = 20, end = 6 }

# Enable rtcwake poweroff between refresh cycles for maximum battery savings.
# Requires DS3231 RTC with INT/SQW wired to GPIO4 and the gpio-shutdown
# overlay configured. Default: false
shutdown_after_cycle = false

# Refresh interval (seconds) when charging or when no battery sensor is
# detected (e.g. running on a dev machine). Default: 1200 (20 minutes)
charging_interval_secs = 1200

# Seconds to stay awake after each refresh cycle before sleeping or shutting
# down. Gives a window for SSH access. Default: 120 (2 minutes)
linger_secs = 120

# Don't rtcwake-shutdown while SSH sessions are active unless battery drops
# below this percentage. Set to 0 to disable SSH detection. Default: 30
ssh_inhibit_below_percent = 60

# Write the recommended /boot/firmware/config.txt for the RPi
# back-up will be written in /boot/firmware/config_{timestamp}.txt
# if you need to recover the previous config
sync_firmware = true

# GPIO pin for TPL5110 DONE signal. When set, the Pi will signal the
# TPL5110 to cut power after each battery cycle (true zero standby current).
# The wake interval is controlled by the resistor on the TPL5110 board.
# Requires the TPL5110 DONE pin wired to this GPIO. Default: not set
# tpl5110_done_pin = 16
